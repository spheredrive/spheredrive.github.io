<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Index Missing (404) | SphereDrive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="nav-container container">
            <a href="index.html" id="logo-link" class="logo">
                <i class="fa-solid fa-circle-nodes logo-icon"></i>
                <span>SphereDrive</span>
            </a>
            <div class="nav-actions">
                <a href="/" class="btn btn-secondary">Home Base</a>
            </div>
        </div>
    </header>

    <main class="container page-spacing text-center error-page-wrapper">
        <div class="error-illustration-box">
            <i class="fa-solid fa-circle-nodes floating-node"></i>
            <span class="error-code-label">404</span>
        </div>
        <h2>Target routing vector unreachable or non-existent.</h2>
        <p class="large-paragraph">The file reference parameters or page destination you are attempting to trace either relocated or expired.</p>
        <div class="error-action-row">
            <a href="/" class="btn btn-primary">Return to Index Workspace</a>
            <a href="/support/" class="btn btn-secondary">Contact System Engineering</a>
        </div>
    </main>

    <script type="module" src="JavaScript/main.js"></script>
</body>
</html>
